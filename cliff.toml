# Peut-Être — git-cliff configuration
# "On va essayer de garder une trace, on promet rien."

[changelog]
header = """
# Changelog

Toutes les modifications notables de Peut-Être sont documentées ici.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/arthur-lonfils/Peut-Etre
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
        {%- if commit.body %}
            {{ commit.body | indent(prefix="  ") }}
        {%- endif %}
    {%- endfor %}
{% endfor %}\n
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org/) — bonne chance.*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Style" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Tests" },
    { message = "^chore", group = "Maintenance" },
    { message = "^ci", group = "CI/CD" },
    { message = "^perf", group = "Performance" },
    { message = "^build", group = "Build" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
